name: phillyparking
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  # Geospatial stack is much friendlier from conda-forge
  - geopandas>=0.14
  - shapely>=2.0
  - pyproj>=3.6
  - rtree>=1.2
  - gdal
  - osmnx>=1.9
  # Core scientific
  - pandas>=2.2
  - numpy>=1.26
  - pyarrow>=15
  - duckdb>=1.0
  - scikit-learn>=1.4
  - xgboost>=2.0
  - statsmodels>=0.14
  - matplotlib>=3.8
  - seaborn>=0.13
  - plotly>=5.20
  - jupyter
  - ipykernel
  # Bayes
  - pymc>=5.10
  - arviz>=0.17
  # Tooling
  - pytest>=8.0
  - ruff
  - black
  - pip:
      - polars>=0.20
      - cvxpy>=1.4
      - xlogit>=0.2.7
      - libpysal>=4.9
      - spreg>=1.4
      - folium>=0.16
      - cenpy>=1.0
      - gtfs-kit>=10.0
      - python-dotenv>=1.0
      - pydantic>=2.6
      - streamlit>=1.32
      - pydeck>=0.8
      - nbstripout>=0.7
      - -e .
